{% extends 'base.html' %}

{% block title %}Edit Member - Library Management</div>
{% endblock %}

{% block content %}
<div class="inner-page">
<div class="form-container">
    <h1>✏️ Edit Member</h1>
    <form method="POST" class="form">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" value="{{ member['name'] }}" required>
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" value="{{ member['email'] }}" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ member['phone'] or '' }}">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3">{{ member['address'] or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="active" {% if member['status'] == 'active' %}selected{% endif %}>Active</option>
                <option value="inactive" {% if member['status'] == 'inactive' %}selected{% endif %}>Inactive</option>
            </select>
        </div>
        <div class="form-actions">
            <a href="/members/" class="btn btn-secondary">← Back</a>
            <button type="submit" class="btn btn-primary">Update Member</button>
        </div>
    </form>
</div>
</div>
{% endblock %}
